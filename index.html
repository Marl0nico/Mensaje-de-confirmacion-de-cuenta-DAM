<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuenta confirmada</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; background: #f5f5f5; }
    .msg { font-size: 1.3em; color: #2e7d32; }
    .icon { font-size: 60px; color: #2e7d32; margin-bottom: 20px; }
    .card { background: #fff; display: inline-block; padding: 40px 30px; border-radius: 12px; box-shadow: 0 2px 8px #0001; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✔️</div>
    <h1>¡Cuenta confirmada!</h1>
    <p class="msg">Tu cuenta ha sido verificada correctamente.<br>
    Vuelve a la página principal e inicia sesión.</p>
    <p style="margin-top:30px;color:#888;">Ya puedes cerrar esta página.</p>
  </div>
</body>
</html>
